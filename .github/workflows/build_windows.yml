name: Build Project - Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        fetch-depth: 0

    - name: Check for build-relevant changes
      uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
      id: filter
      with:
        filters: |
          build:
            - 'src/**'
            - 'tests/**'
            - 'CMakeLists.txt'
            - '.github/workflows/build_windows.yml'

    - name: Extract pinned raylib commit
      if: steps.filter.outputs.build == 'true'
      id: raylib
      shell: bash
      run: echo "sha=$(grep -oE '[0-9a-f]{40}' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

    - name: Cache raylib build
      if: steps.filter.outputs.build == 'true'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: build/_deps
        key: raylib-windows-${{ steps.raylib.outputs.sha }}

    - name: Configure
      if: steps.filter.outputs.build == 'true'
      run: cmake -B build

    - name: Build
      if: steps.filter.outputs.build == 'true'
      run: cmake --build build --config Release

    - name: Test
      if: steps.filter.outputs.build == 'true'
      run: ctest --test-dir build --output-on-failure -C Release

    - name: Package artifact
      if: steps.filter.outputs.build == 'true'
      shell: bash
      run: |
        mkdir -p artifact
        cp build/openarpg/Release/openarpg.exe artifact/
        cp -r build/openarpg/Release/resources artifact/resources
        cp README.md LICENSE artifact/

    - name: Upload artifact
      if: steps.filter.outputs.build == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: openarpg-windows-x64
        path: artifact/
