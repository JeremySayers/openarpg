name: Build Project - Windows

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build_windows.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build_windows.yml'

permissions:
  contents: read

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Package artifact
      shell: bash
      run: |
        mkdir -p artifact
        cp build/openarpg/Release/openarpg.exe artifact/
        cp -r build/openarpg/Release/resources artifact/resources
        cp README.md LICENSE artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openarpg-windows-x64
        path: artifact/
