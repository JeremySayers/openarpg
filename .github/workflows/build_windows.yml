name: Build Project - Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for build-relevant changes
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          build:
            - 'src/**'
            - 'CMakeLists.txt'
            - '.github/workflows/build_windows.yml'

    - name: Extract pinned raylib commit
      if: steps.filter.outputs.build == 'true'
      id: raylib
      shell: bash
      run: echo "sha=$(grep -oE '[0-9a-f]{40}' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

    - name: Cache raylib build
      if: steps.filter.outputs.build == 'true'
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: raylib-windows-${{ steps.raylib.outputs.sha }}

    - name: Configure
      if: steps.filter.outputs.build == 'true'
      run: cmake -B build

    - name: Build
      if: steps.filter.outputs.build == 'true'
      run: cmake --build build --config Release

    - name: Package artifact
      if: steps.filter.outputs.build == 'true'
      shell: bash
      run: |
        mkdir -p artifact
        cp build/openarpg/Release/openarpg.exe artifact/
        cp -r build/openarpg/Release/resources artifact/resources
        cp README.md LICENSE artifact/

    - name: Upload artifact
      if: steps.filter.outputs.build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: openarpg-windows-x64
        path: artifact/
